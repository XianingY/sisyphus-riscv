    cppClass: ArithAddiODSOp
    typeFormat: sameOperandsAndResult
    assemblyFormat: generic
    verify: verifySameIntegerOperands
    fold: foldAddI
  - name: andi
    dialect: arith
    operands: [lhs, rhs]
    results: [result]
    attrs: []
    traits: [Commutative, Pure, SameOperandsAndResultType]
