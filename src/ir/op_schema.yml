ops:
  - name: module
    dialect: builtin
    operands: []
    results: []
    attrs: []
    traits: [IsolatedFromAbove, HasRegion]
    interfaces: [RegionBranchOpInterface]
    cppClass: BuiltinModuleODSOp
    typeFormat: none
    assemblyFormat: region
    verify: verifyModule
    fold: foldNone
  - name: func
    dialect: sysy
    operands: []
    results: []
    attrs: [sym_name, type]
